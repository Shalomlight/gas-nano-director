[project]
name = "gas-nano-director"
authors = ["Gas Nano Team"]
description = "Decentralized platform for smart contract gas optimization and verification"
telemetry = false
requirements = []
[contracts.gas-director]
path = "contracts/gas-director.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
